name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          PORT="${SFTP_PORT:-65002}"
          if [ "$PORT" = "21" ] || [ -z "$PORT" ]; then
            PORT="65002"
          fi
          echo "Connecting to $SFTP_SERVER on port $PORT as $SFTP_USERNAME..."
          sshpass -p "$SFTP_PASSWORD" scp \
            -P "$PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -r dist/* \
            "$SFTP_USERNAME@$SFTP_SERVER:domains/magnapromotion.com/public_html/" || \
          sshpass -p "$SFTP_PASSWORD" scp \
            -P "$PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -r dist/* \
            "$SFTP_USERNAME@$SFTP_SERVER:public_html/"
