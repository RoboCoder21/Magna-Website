name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via LFTP
        env:
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_HOST: ${{ secrets.SFTP_SERVER || '178.16.128.242' }}
          FTP_TARGET: ${{ secrets.SFTP_TARGET_DIR || '/domains/magnapromotion.com/public_html/' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install lftp -y
          CLEAN_TARGET=$(echo "$FTP_TARGET" | tr -d '\r')
          lftp -c "set ftp:ssl-allow no; set net:timeout 10; set net:max-retries 3; open -u \"$FTP_USER\",\"$FTP_PASS\" ftp://$FTP_HOST; mirror -Rnv --parallel=10 ./dist/ \"$CLEAN_TARGET\";"
