name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via LFTP
        run: |
          sudo apt-get update -y
          sudo apt-get install lftp -y
          lftp -c "set ftp:ssl-allow no; set net:timeout 10; set net:max-retries 3; open -u '${{ secrets.SFTP_USERNAME }}','${{ secrets.SFTP_PASSWORD }}' ftp://${{ secrets.SFTP_SERVER || '178.16.128.242' }}; mirror -Rnv ./dist/ ./ --parallel=10"