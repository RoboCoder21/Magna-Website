name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main # Change this to 'master' if your main branch is named master

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 65002 }}
          local_path: './dist/*'
          remote_path: '/domains/magnapromotion.com/public_html/'
          sftp_only: true
          sftpArgs: '-o StrictHostKeyChecking=no'
